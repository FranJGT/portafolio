<!-- 01 - Hero Section -->
<section class="relative w-full h-[900px] bg-black overflow-hidden">

  <!-- Decorative Gradient Blobs -->
  <div class="absolute top-[200px] left-[150px] w-[500px] h-[500px] rounded-full opacity-40"
       style="background: radial-gradient(circle, #4F46E580 0%, #4F46E500 100%);"></div>
  <div class="absolute top-[100px] left-[600px] w-[400px] h-[400px] rounded-full opacity-[0.35]"
       style="background: radial-gradient(circle, #7C3AED60 0%, #7C3AED00 100%);"></div>
  <div class="absolute top-[300px] left-[850px] w-[450px] h-[450px] rounded-full opacity-30"
       style="background: radial-gradient(circle, #06B6D450 0%, #06B6D400 100%);"></div>
  <div class="absolute top-[320px] left-[420px] w-[600px] h-[300px] rounded-full opacity-50"
       style="background: radial-gradient(circle, #7C3AED40 0%, #7C3AED00 100%);"></div>

  <!-- Floating Navbar -->
  <nav class="absolute top-8 left-1/2 -translate-x-1/2 z-50">
    <div class="flex items-center gap-2 h-[52px] px-2 py-1.5 rounded-full border border-white/[0.06] w-[1000px]"
         style="background: #0A0A0AB3; backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);">
      <!-- Logo -->
      <div class="w-[38px] h-[38px] rounded-full gradient-bg-accent flex items-center justify-center flex-shrink-0">
        <span class="text-white font-space text-[16px] font-bold">F.</span>
      </div>
      <div class="w-6"></div>
      <!-- Nav Links -->
      <a href="#proyectos" class="text-[#A1A1AA] font-geist text-[13px] hover:text-white transition-colors px-2">Proyectos</a>
      <a href="#proceso" class="text-[#A1A1AA] font-geist text-[13px] hover:text-white transition-colors px-2">Proceso</a>
      <a href="#precios" class="text-[#A1A1AA] font-geist text-[13px] hover:text-white transition-colors px-2">Precios</a>
      <a href="#contacto" class="text-[#A1A1AA] font-geist text-[13px] hover:text-white transition-colors px-2">Contacto</a>
      <div class="flex-1"></div>
      <!-- CTA Button -->
      <a href="#contacto" class="h-[38px] px-5 rounded-full gradient-bg-accent flex items-center justify-center hover:opacity-90 transition-opacity">
        <span class="text-white font-geist text-[13px] font-medium">Hablemos</span>
      </a>
    </div>
  </nav>

  <!-- Hero Content -->
  <div class="relative z-10 flex flex-col items-center justify-center h-full px-[120px]">
    <!-- Eyebrow -->
    <div class="flex items-center gap-3">
      <div class="w-8 h-[2px] rounded-sm gradient-bg-accent"></div>
      <span class="text-[#71717A] font-geist-mono text-[13px] tracking-[1.5px]">Diseñador Web · Chile</span>
    </div>

    <div class="h-8"></div>

    <!-- Headline -->
    <div class="flex flex-col items-center">
      <h1 class="text-white font-instrument text-[80px] leading-[1.05] tracking-[-2px]">Diseño páginas</h1>
      <span class="gradient-text-accent font-instrument text-[80px] leading-[1.05] tracking-[-2px]">que convierten.</span>
    </div>

    <div class="h-7"></div>

    <!-- Subtitle -->
    <p class="text-[#71717A] font-geist text-lg">Baja y mira lo que puedo hacer por tu negocio.</p>

    <div class="h-10"></div>

    <!-- Arrow Down Button -->
    <button class="w-12 h-12 rounded-full border border-white/[0.06] flex items-center justify-center hover:border-white/20 transition-colors">
      <i data-lucide="chevron-down" class="w-[22px] h-[22px] text-[#71717A]"></i>
    </button>
  </div>

</section>
